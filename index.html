<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shop PRO FULL</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#063d2a,#0b5a3d);
  color:white;
}

#loginBox{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:10px;
}

#shop{ display:none; }

input{
  padding:8px;
  border:none;
  border-radius:8px;
  outline:none;
}

button{
  padding:6px 10px;
  border:none;
  border-radius:8px;
  background:#00c46a;
  color:white;
  cursor:pointer;
  margin:2px;
}

.card{
  background:rgba(255,255,255,0.1);
  margin:10px;
  padding:10px;
  border-radius:10px;
}

.topbar{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
  padding:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <h2>🔐 Login</h2>
  <input id="pass" type="password" placeholder="Parol">
  <button onclick="login()">Kirish</button>
</div>

<!-- SHOP -->
<div id="shop">

<h2 style="text-align:center">🏪 DO‘KON SYSTEM PRO</h2>

<div class="topbar">
  <input id="search" placeholder="Qidirish..." onkeyup="show()">
  <button onclick="exportExcel()">📊 Excel</button>
  <button onclick="logout()">Chiqish</button>
</div>

<div style="text-align:center">
  <input id="name" placeholder="Nomi">
  <input id="count" type="number" placeholder="Soni">
  <input id="cost" type="number" placeholder="Tannarx">
  <input id="price" type="number" placeholder="Narx">
  <button onclick="addProduct()">Qo‘shish</button>
</div>

<h3 style="text-align:center">
Foyda: <span id="profit">0</span>
<button onclick="resetProfit()">🔄</button>
</h3>

<h3 style="text-align:center">📊 Tarix</h3>
<div id="historyBox" style="text-align:center"></div>
<button onclick="clearHistory()">🗑 Tozalash</button>

<div id="list"></div>

</div>

<script>

// 🔐 LOGIN
function login(){
 let p = document.getElementById("pass").value;
 let saved = localStorage.getItem("password") || "1234";

 if(p === saved){
  localStorage.setItem("login","ok");
  openShop();
 } else alert("Parol xato!");
}

function openShop(){
 document.getElementById("loginBox").style.display="none";
 document.getElementById("shop").style.display="block";
 show();
 showHistory();
}

function logout(){
 localStorage.removeItem("login");
 location.reload();
}

if(localStorage.getItem("login")==="ok"){
 openShop();
}

// 💾 DATA
let products = JSON.parse(localStorage.getItem("products")) || [];
let profit = Number(localStorage.getItem("profit")) || 0;
let history = JSON.parse(localStorage.getItem("history")) || [];

function save(){
 localStorage.setItem("products",JSON.stringify(products));
 localStorage.setItem("profit",profit);
 localStorage.setItem("history",JSON.stringify(history));
}

// ➕ ADD
function addProduct(){

 let n = document.getElementById("name").value.trim();
 let c = Number(document.getElementById("count").value);
 let co = Number(document.getElementById("cost").value);
 let p = Number(document.getElementById("price").value);

 if(!n || !c || !co || !p){
  alert("To‘ldir!");
  return;
 }

 products.push({name:n,count:c,cost:co,price:p});

 save();
 show();

 document.getElementById("name").value="";
 document.getElementById("count").value="";
 document.getElementById("cost").value="";
 document.getElementById("price").value="";
}

// ✏️ EDIT
function editProduct(i){
 let n = prompt("Nom:", products[i].name);
 let c = prompt("Soni:", products[i].count);
 let co = prompt("Tannarx:", products[i].cost);
 let p = prompt("Narx:", products[i].price);

 if(!n || !c || !co || !p) return;

 products[i]={name:n,count:+c,cost:+co,price:+p};
 save();
 show();
}

// ❌ DELETE
function deleteProduct(i){
 if(confirm("O‘chirasanmi?")){
  products.splice(i,1);
  save();
  show();
 }
}

// ➕ ADD STOCK
function add(i){
 let q = Number(document.getElementById("a"+i).value);
 if(q>0){
  products[i].count += q;
  save();
  show();
 }
}

// ➖ SELL (FIXED + HISTORY)
function sell(i){
 let q = Number(document.getElementById("s"+i).value);
 if(q<=0) return;

 let p = products[i];
 if(p.count<q) return alert("Yetarli emas!");

 let pr = (p.price - p.cost) * q;

 p.count -= q;
 profit += pr;

 // 📊 HISTORY YOZISH
 history.push({
  time: new Date().toLocaleString(),
  product: p.name,
  qty: q,
  profit: pr
 });

 save();
 show();
 showHistory();
}

// 🔄 RESET PROFIT
function resetProfit(){
 if(profit>0){
  history.push({
   time: new Date().toLocaleString(),
   product:"TOTAL RESET",
   qty:"-",
   profit:profit
  });
 }

 profit = 0;
 save();
 show();
 showHistory();
}

// 📊 HISTORY
function showHistory(){
 let box = document.getElementById("historyBox");
 box.innerHTML="";

 history.slice().reverse().forEach(h=>{
  box.innerHTML += `
  <div>
   ${h.time} | ${h.product} | ${h.qty} | +${h.profit}
  </div>`;
 });
}

function clearHistory(){
 history=[];
 save();
 showHistory();
}

// 🔍 SHOW
function show(){

 let list = document.getElementById("list");
 let q = document.getElementById("search").value.toLowerCase();

 list.innerHTML="";

 products
 .filter(p=>p.name.toLowerCase().includes(q))
 .forEach((p,i)=>{

 list.innerHTML += `
  <div class="card">
   <h3>${p.name}</h3>
   <div>Ombor: ${p.count}</div>

   ➕ <input id="a${i}" type="number">
   <button onclick="add(${i})">+</button>

   ➖ <input id="s${i}" type="number">
   <button onclick="sell(${i})">Sell</button>

   <br><br>
   ✏️ <button onclick="editProduct(${i})">Edit</button>
   ❌ <button onclick="deleteProduct(${i})">Delete</button>
  </div>
 `;
 });

 document.getElementById("profit").innerText = profit;
}

// 📊 EXCEL EXPORT (CSV)
function exportExcel(){
 let csv = "Nomi,Soni,Tannarx,Narx,Foyda\n";

 products.forEach(p=>{
  let pr = (p.price - p.cost) * p.count;
  csv += `${p.name},${p.count},${p.cost},${p.price},${pr}\n`;
 });

 let blob = new Blob([csv], {type:"text/csv"});
 let url = URL.createObjectURL(blob);

 let a = document.createElement("a");
 a.href = url;
 a.download = "shop-report.csv";
 a.click();
}

show();

</script>

</body>
</html>
